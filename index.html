<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 700px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .calculator {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 25px;
            width: 100%;
            max-width: 360px;
        }
        
        .display {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .display .memory-status {
            font-size: 14px;
            color: #28a745;
            min-height: 20px;
            text-align: left;
            font-weight: 500;
        }
        
        .display .memory-status.empty {
            color: transparent;
        }
        
        .display .expression {
            font-size: 18px;
            color: #6c757d;
            min-height: 24px;
            word-break: break-all;
        }
        
        .display .result {
            font-size: 32px;
            font-weight: 600;
            color: #212529;
            word-break: break-all;
        }
        
        .memory-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .btn-memory {
            padding: 12px 8px;
            font-size: 14px;
            background: #e9ecef;
            color: #495057;
            border: 1px solid #dee2e6;
        }
        
        .btn-memory:hover {
            background: #dee2e6;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .btn {
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-num {
            background: #f8f9fa;
            color: #212529;
        }
        
        .btn-num:hover {
            background: #e9ecef;
        }
        
        .btn-op {
            background: #667eea;
            color: white;
        }
        
        .btn-op:hover {
            background: #5a6fd6;
        }
        
        .btn-op.active {
            background: #764ba2;
        }
        
        .btn-clear {
            background: #dc3545;
            color: white;
        }
        
        .btn-clear:hover {
            background: #c82333;
        }
        
        .btn-equals {
            background: #28a745;
            color: white;
            grid-column: span 2;
        }
        
        .btn-equals:hover {
            background: #218838;
        }
        
        .btn-dot {
            background: #ffc107;
            color: #212529;
        }
        
        .btn-dot:hover {
            background: #e0a800;
        }

        .history-panel {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .history-title {
            font-size: 18px;
            font-weight: 600;
            color: #212529;
        }

        .history-clear-btn {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .history-clear-btn:hover {
            background: #fff5f5;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 2px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 2px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        .history-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .history-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .history-content {
            flex: 1;
            min-width: 0;
        }

        .history-expression {
            font-size: 14px;
            color: #6c757d;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .history-result {
            font-size: 18px;
            font-weight: 600;
            color: #218838;
            word-break: break-all;
        }

        .history-delete-btn {
            background: none;
            border: none;
            color: #adb5bd;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .history-delete-btn:hover {
            color: #dc3545;
            background: #fff5f5;
        }

        .history-empty {
            text-align: center;
            color: #adb5bd;
            font-size: 14px;
            padding: 30px 0;
        }

        @media (max-width: 700px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            
            .calculator,
            .history-panel {
                max-width: 100%;
            }
            
            .history-panel {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <div class="memory-status" id="memoryStatus"></div>
                <div class="expression" id="expression">0</div>
                <div class="result" id="result">0</div>
            </div>
            <div class="memory-buttons">
                <button class="btn btn-memory" id="mc">MC</button>
                <button class="btn btn-memory" id="mr">MR</button>
                <button class="btn btn-memory" id="mPlus">M+</button>
                <button class="btn btn-memory" id="mMinus">M-</button>
            </div>
            <div class="buttons">
                <button class="btn btn-clear" id="clear">C</button>
                <button class="btn btn-op" data-op="/">÷</button>
                <button class="btn btn-op" data-op="*">×</button>
                <button class="btn btn-op" data-op="-">−</button>
                
                <button class="btn btn-num" data-num="7">7</button>
                <button class="btn btn-num" data-num="8">8</button>
                <button class="btn btn-num" data-num="9">9</button>
                <button class="btn btn-op" data-op="+">+</button>
                
                <button class="btn btn-num" data-num="4">4</button>
                <button class="btn btn-num" data-num="5">5</button>
                <button class="btn btn-num" data-num="6">6</button>
                <button class="btn btn-op" data-op="-">−</button>
                
                <button class="btn btn-num" data-num="1">1</button>
                <button class="btn btn-num" data-num="2">2</button>
                <button class="btn btn-num" data-num="3">3</button>
                <button class="btn btn-op" data-op="+">+</button>
                
                <button class="btn btn-num" data-num="0">0</button>
                <button class="btn btn-dot" id="dot">.</button>
                <button class="btn btn-equals" id="equals">=</button>
            </div>
        </div>

        <div class="history-panel">
            <div class="history-header">
                <span class="history-title">计算历史</span>
                <button class="history-clear-btn" id="historyClear">清空全部</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">暂无历史记录</div>
            </div>
        </div>
    </div>

    <script>
        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');
        const memoryStatusEl = document.getElementById('memoryStatus');
        const clearBtn = document.getElementById('clear');
        const dotBtn = document.getElementById('dot');
        const equalsBtn = document.getElementById('equals');
        const mcBtn = document.getElementById('mc');
        const mrBtn = document.getElementById('mr');
        const mPlusBtn = document.getElementById('mPlus');
        const mMinusBtn = document.getElementById('mMinus');
        const numBtns = document.querySelectorAll('.btn-num');
        const opBtns = document.querySelectorAll('.btn-op');
        const historyListEl = document.getElementById('historyList');
        const historyClearBtn = document.getElementById('historyClear');
        
        let expression = '';
        let result = '0';
        let lastInputType = '';
        let hasResult = false;
        let lastCalculation = '';
        let history = [];
        let memory = 0;
        
        const STORAGE_KEY = 'calculator_history';
        const MEMORY_KEY = 'calculator_memory';

        function loadHistory() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    history = JSON.parse(saved);
                }
            } catch (e) {
                history = [];
            }
            renderHistory();
        }

        function loadMemory() {
            try {
                const saved = localStorage.getItem(MEMORY_KEY);
                if (saved !== null) {
                    memory = parseFloat(saved);
                    if (isNaN(memory)) {
                        memory = 0;
                    }
                }
            } catch (e) {
                memory = 0;
            }
            updateMemoryStatus();
        }

        function saveMemory() {
            try {
                localStorage.setItem(MEMORY_KEY, memory.toString());
            } catch (e) {
                console.error('Failed to save memory');
            }
        }

        function updateMemoryStatus() {
            if (memory !== 0) {
                memoryStatusEl.textContent = `M: ${memory}`;
                memoryStatusEl.classList.remove('empty');
            } else {
                memoryStatusEl.textContent = '';
                memoryStatusEl.classList.add('empty');
            }
        }

        function isValidMemoryValue(value) {
            if (value === 'Error' || value === '' || lastInputType === 'operator') {
                return false;
            }
            const num = parseFloat(value);
            return typeof num === 'number' && isFinite(num);
        }

        function memoryClear() {
            memory = 0;
            saveMemory();
            updateMemoryStatus();
        }

        function memoryRecall() {
            if (memory !== 0) {
                const memoryStr = memory.toString();
                if (lastInputType === 'operator') {
                    expression += memoryStr;
                    result = memoryStr;
                    lastInputType = 'number';
                } else if (lastInputType === 'equals' || lastInputType === 'error') {
                    expression = memoryStr;
                    result = memoryStr;
                    lastInputType = 'number';
                    hasResult = false;
                } else {
                    expression = memoryStr;
                    result = memoryStr;
                    lastInputType = 'number';
                }
                updateDisplay();
                clearActiveOp();
            }
        }

        function memoryAdd() {
            if (isValidMemoryValue(result)) {
                memory += parseFloat(result);
                saveMemory();
                updateMemoryStatus();
            }
        }

        function memorySubtract() {
            if (isValidMemoryValue(result)) {
                memory -= parseFloat(result);
                saveMemory();
                updateMemoryStatus();
            }
        }

        function saveHistory() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            } catch (e) {
                console.error('Failed to save history');
            }
        }

        function renderHistory() {
            if (history.length === 0) {
                historyListEl.innerHTML = '<div class="history-empty">暂无历史记录</div>';
                return;
            }
            
            historyListEl.innerHTML = history.map((item, index) => `
                <div class="history-item" data-index="${index}">
                    <div class="history-content">
                        <div class="history-expression">${escapeHtml(item.expression)}</div>
                        <div class="history-result">${escapeHtml(item.result)}</div>
                    </div>
                    <button class="history-delete-btn" data-index="${index}">×</button>
                </div>
            `).join('');
        }

        function addToHistory(exp, res) {
            const newRecord = { expression: exp, result: res };
            const recordString = `${exp}=${res}`;
            
            if (recordString === lastCalculation) {
                return;
            }
            
            history.unshift(newRecord);
            history = history.slice(0, 50);
            lastCalculation = recordString;
            saveHistory();
            renderHistory();
        }

        function removeFromHistory(index) {
            history.splice(index, 1);
            saveHistory();
            renderHistory();
        }

        function clearHistory() {
            history = [];
            lastCalculation = '';
            saveHistory();
            renderHistory();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateDisplay() {
            expressionEl.textContent = expression || '0';
            resultEl.textContent = result;
        }
        
        function addNumber(num) {
            if (hasResult) {
                expression = '';
                result = '0';
                hasResult = false;
            }
            
            if (lastInputType === 'operator') {
                expression += num;
                result = num;
            } else if (lastInputType === 'equals') {
                expression = num;
                result = num;
            } else {
                if (result === '0') {
                    result = num;
                } else {
                    result += num;
                }
                expression += num;
            }
            
            lastInputType = 'number';
            updateDisplay();
            clearActiveOp();
        }
        
        function addOperator(op) {
            if (lastInputType === 'number' || lastInputType === 'equals') {
                expression += op;
                lastInputType = 'operator';
                updateDisplay();
                setActiveOp(op);
            } else if (lastInputType === 'operator') {
                expression = expression.slice(0, -1) + op;
                updateDisplay();
                setActiveOp(op);
            }
        }
        
        function addDot() {
            if (hasResult) {
                expression = '';
                result = '0';
                hasResult = false;
            }
            
            if (lastInputType === 'operator') {
                expression += '0.';
                result = '0.';
            } else if (lastInputType === 'equals') {
                expression = '0.';
                result = '0.';
            } else {
                if (!result.includes('.')) {
                    result += '.';
                    expression += '.';
                }
            }
            
            lastInputType = 'number';
            updateDisplay();
            clearActiveOp();
        }
        
        function calculate() {
            if (!expression || lastInputType === 'operator') {
                return;
            }
            
            try {
                const sanitized = expression
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');
                
                const calculated = eval(sanitized);
                
                if (typeof calculated === 'number' && isFinite(calculated)) {
                    const originalExpression = expression;
                    result = calculated.toString();
                    if (result.includes('.') && result.split('.')[1].length > 10) {
                        result = calculated.toFixed(10);
                    }
                    
                    addToHistory(originalExpression, result);
                    
                    hasResult = true;
                    lastInputType = 'equals';
                    updateDisplay();
                    clearActiveOp();
                } else {
                    result = 'Error';
                    expression = '';
                    lastInputType = 'error';
                    updateDisplay();
                }
            } catch {
                result = 'Error';
                expression = '';
                lastInputType = 'error';
                updateDisplay();
            }
        }
        
        function clearAll() {
            expression = '';
            result = '0';
            lastInputType = '';
            hasResult = false;
            updateDisplay();
            clearActiveOp();
        }
        
        function setActiveOp(op) {
            opBtns.forEach(btn => {
                if (btn.dataset.op === op) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        function clearActiveOp() {
            opBtns.forEach(btn => btn.classList.remove('active'));
        }

        function useHistoryResult(resultValue) {
            expression = resultValue;
            result = resultValue;
            lastInputType = 'number';
            hasResult = false;
            updateDisplay();
            clearActiveOp();
        }
        
        numBtns.forEach(btn => {
            btn.addEventListener('click', () => addNumber(btn.dataset.num));
        });
        
        opBtns.forEach(btn => {
            btn.addEventListener('click', () => addOperator(btn.dataset.op));
        });
        
        dotBtn.addEventListener('click', addDot);
        equalsBtn.addEventListener('click', calculate);
        clearBtn.addEventListener('click', clearAll);
        historyClearBtn.addEventListener('click', clearHistory);
        
        mcBtn.addEventListener('click', memoryClear);
        mrBtn.addEventListener('click', memoryRecall);
        mPlusBtn.addEventListener('click', memoryAdd);
        mMinusBtn.addEventListener('click', memorySubtract);

        historyListEl.addEventListener('click', (e) => {
            const target = e.target;
            const itemEl = target.closest('.history-item');
            
            if (target.classList.contains('history-delete-btn')) {
                e.stopPropagation();
                const index = parseInt(target.dataset.index);
                removeFromHistory(index);
            } else if (itemEl) {
                const index = parseInt(itemEl.dataset.index);
                const item = history[index];
                useHistoryResult(item.result);
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') {
                addNumber(e.key);
            } else if (['+', '-', '*', '/'].includes(e.key)) {
                const opMap = { '+': '+', '-': '−', '*': '×', '/': '÷' };
                addOperator(opMap[e.key]);
            } else if (e.key === '.') {
                addDot();
            } else if (e.key === '=' || e.key === 'Enter') {
                calculate();
            } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearAll();
            }
        });
        
        loadHistory();
        loadMemory();
        updateDisplay();
    </script>
</body>
</html>
